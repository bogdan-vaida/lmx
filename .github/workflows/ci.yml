name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: QA ─────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff

      - name: Lint with ruff
        run: ruff check . --ignore E501
        continue-on-error: true

      - name: Run tests with coverage
        run: |
          pytest --cov=. --cov-report=html --cov-report=xml \
            --ignore=gh_2.89.0_macOS_arm64 \
            -v || true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: coverage-report-${{ github.sha }}
          path: htmlcov/
          retention-days: 30

  # ── Job 2: Security Scan ──────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t lmx-scan:latest .

      - name: Run Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: lmx-scan:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Run Trivy and save report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: lmx-scan:latest
          format: json
          output: trivy-report.json
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Upload security scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report-${{ github.sha }}
          path: trivy-report.json
          retention-days: 30

  # ── Job 3: Build and Push Docker Image ────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            vaidabogdan/lmx:latest
            vaidabogdan/lmx:${{ github.sha }}